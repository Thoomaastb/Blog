name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Log in to GitHub Container Registry
        run: |
          echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io \
            -u ${{ github.actor }} --password-stdin

      - name: Build & Push Docker Image
        run: |
          docker build -t ghcr.io/thoomaastb/blog:latest .
          docker push ghcr.io/thoomaastb/blog:latest

      - name: Deploy auf herakles
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            export DOCKER_HOST=unix:///run/user/$(id -u)/docker.sock
            docker pull ghcr.io/thoomaastb/blog:latest
            docker stop bussonline-blog || true
            docker rm bussonline-blog || true
            docker run -d \
              --name bussonline-blog \
              --restart unless-stopped \
              --network remote \
              ghcr.io/thoomaastb/blog:latest