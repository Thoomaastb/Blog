<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ .Title }} | {{ .Site.Title }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <link rel="canonical" href="{{ .Permalink }}">
  <meta property="og:title" content="{{ .Title }}">
  <meta property="og:description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <meta property="og:url" content="{{ .Permalink }}">
  {{ with .Params.og_image }}
  <meta property="og:image" content="{{ . | absURL }}">
  {{ end }}
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header>
        <a href="/" class="logo">
            <img src="https://thomasbuss.net/wp-content/uploads/2024/07/LogoText_farbig_private-scaled.webp"
                alt="Thomas Buß – Cybersecurity, Data Protection und die Liebe fürs Web"
                onerror="this.style.display='none'; this.nextElementSibling.style.display='block'">
            <span class="logo-fallback">Thomas Buß – Cybersecurity, Data Protection und die Liebe fürs Web</span>
        </a>
        <nav id="main-nav">
            {{ range .Site.Params.nav_categories }}
            <a href="{{ .url }}">{{ .name }}</a>
            {{ end }}
            <button id="theme-toggle" aria-label="Theme wechseln">🌙</button>
        </nav>
        <button id="hamburger" aria-label="Menü öffnen" aria-expanded="false">
            <span></span><span></span><span></span>
        </button>
    </header>
    <main>
        {{ block "main" . }}{{ end }}
    </main>
    <footer>
        <p>© {{ now.Year }} Thomas Buß</p>
    </footer>
</body>
</html>

<script>
  const btn = document.getElementById('theme-toggle');
  const root = document.documentElement;
  const hamburger = document.getElementById('hamburger');
  const nav = document.getElementById('main-nav');

  // Theme
  const saved = localStorage.getItem('theme');
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const isDark = saved ? saved === 'dark' : prefersDark;
  if (!isDark) root.setAttribute('data-theme', 'light');
  btn.textContent = isDark ? '🌙' : '☀️';

  btn.addEventListener('click', () => {
    const current = root.getAttribute('data-theme') !== 'light';
    root.setAttribute('data-theme', current ? 'light' : 'dark');
    localStorage.setItem('theme', current ? 'light' : 'dark');
    btn.textContent = current ? '☀️' : '🌙';
  });

  // Hamburger
  hamburger.addEventListener('click', () => {
    const open = nav.classList.toggle('open');
    hamburger.classList.toggle('open', open);
    hamburger.setAttribute('aria-expanded', open);
  });

  // Klick außerhalb schließt Menü
  document.addEventListener('click', (e) => {
    if (!nav.contains(e.target) && !hamburger.contains(e.target)) {
      nav.classList.remove('open');
      hamburger.classList.remove('open');
      hamburger.setAttribute('aria-expanded', false);
    }
  });
</script>
