<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ .Title }} | {{ .Site.Title }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <link rel="canonical" href="{{ .Permalink }}">
  <meta property="og:title" content="{{ .Title }}">
  <meta property="og:description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <meta property="og:url" content="{{ .Permalink }}">
  {{ with .Params.og_image }}
  <meta property="og:image" content="{{ . | absURL }}">
  {{ end }}
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header>
    <a href="/">{{ .Site.Params.logo | default .Site.Title }}</a>
    <nav>
        <a href="/blog/">Blog</a>
        <a href="https://thomasbuss.net" target="_blank">thomasbuss.net</a>
        <button id="theme-toggle" aria-label="Theme wechseln">🌙</button>
    </nav>
    </header>
    <main>
        {{ block "main" . }}{{ end }}
    </main>
    <footer>
        <p>© {{ now.Year }} Thomas Buß</p>
    </footer>
</body>
</html>
